---

aap_version: 26

controller_validate_certs: false
controller_verify_ssl: false
tower_verify_ssl: false
validate_certs: false
verify_ssl: false

controller_bootstrap_organization: "jeff-test"
controller_bootstrap_inventory_name: "jeff-test-inventory"
controller_bootstrap_project_name: "jeff-test-project"
controller_bootstrap_execution_environment_name: "ee-supported-rhel9"
bootstrap_controller_local_inventory_name: "jeff-test-inventory"
bootstrap_controller_rhel_inventory_name: "jeff-test-RHEL-Inventory"
bootstrap_controller_idm_inventory_name: "jeff-test-IDM-Inventory"
bootstrap_controller_satellite_inventory_name: "jeff-test-Satellite-Server-Inventory"
bootstrap_controller_cert_manager_mode: "cert"

controller_bootstrap_creds: "jeff-test-vault"
controller_bootstrap_name_prefix: "jeff-test"
controller_bootstrap_machine_credential: "jeff-test-jeff-machine"

bootstrap_controller_hub_publish_ado_collection: true
bootstrap_controller_hub_mark_ado_validated: true
hub_collections:
  - collection_name: infra_ado
    collection_local_path: "."
    repository: "validated"

controller_bootstrap_controller_organizations:
  - name: "jeff-test"
    description: "jeff-test"

controller_bootstrap_controller_credentials:
  - name: "jeff-test-project-git-token"
    description: "Git token credential for jeff-test-project"
    organization: "jeff-test"
    credential_type: Source Control
    inputs:
      username: "oauth2"
      password: "{{ '{{ vault_controller_git_token }}' }}"

  - name: "jeff-test-vault"
    description: "jeff-test-vault"
    organization: "jeff-test"
    credential_type: Vault
    inputs:
      vault_password: "{{ '{{ vault_controller_vault_password }}' }}"

  - name: "jeff-test-jeff-machine"
    description: "Machine credential for RHEL, Satellite, and patching jobs"
    organization: "jeff-test"
    credential_type: Machine
    inputs:
      username: "{{ '{{ vault_machine_credential_username }}' }}"
      ssh_key_data: "{{ '{{ vault_machine_credential_ssh_key_data }}' }}"
      ssh_key_unlock: "{{ '{{ vault_machine_credential_ssh_key_unlock }}' }}"
      become_method: "{{ '{{ vault_machine_credential_become_method }}' }}"
      become_username: "{{ '{{ vault_machine_credential_become_username }}' }}"

  - name: "jeff-test-jeff-test"
    description: "Satellite dynamic inventory credential"
    organization: "jeff-test"
    credential_type: Red Hat Satellite 6
    inputs:
      host: "https://sat.server.lab"
      username: "{{ '{{ vault_satellite_service_account_username }}' }}"
      password: "{{ '{{ vault_satellite_service_account_password }}' }}"

controller_bootstrap_controller_projects:
  - name: "jeff-test-project"
    organization: "jeff-test"
    scm_type: git
    scm_url: "https://github.com/jradabau-rh/ado-preflight.git"
    scm_branch: "main"
    credential: "jeff-test-project-git-token"
    wait: true
    update_project: true

controller_bootstrap_controller_inventories:
  - name: "jeff-test-inventory"
    organization: "jeff-test"
    description: "Generated local bootstrap inventory"
    variables: {}

  - name: "jeff-test-RHEL-Inventory"
    organization: "jeff-test"
    description: "Generated RHEL managed host inventory"
    variables: {}

  - name: "jeff-test-Satellite-Server-Inventory"
    organization: "jeff-test"
    description: "Generated Satellite server inventory"
    variables: {}

bootstrap_controller_controller_hosts:
  - name: localhost
    inventory: "jeff-test-inventory"
    description: "Local execution host"
    enabled: true
    variables:
      ansible_connection: local
  - name: "sat.server.lab"
    inventory: "jeff-test-Satellite-Server-Inventory"
    description: "Satellite host"
    enabled: true
    variables: {}

controller_bootstrap_controller_inventory_sources:
  - name: "jeff-test-Satellite-Dynamic-Inventory"
    description: "Satellite 6 dynamic inventory source"
    inventory: "jeff-test-RHEL-Inventory"
    organization: "jeff-test"
    source: satellite6
    credential: "jeff-test-jeff-test"
    overwrite: true
    overwrite_vars: true
    update_on_launch: true
    update_cache_timeout: 0
    verbosity: 0

controller_bootstrap_controller_execution_environments:
  - name: "ee-supported-rhel9"
    image: quay.io/ansible/awx-ee:latest
    pull: missing

controller_bootstrap_controller_labels:
  - name: "jeff-test"
    organization: "jeff-test"


generate_playbook_repo_git_mode: "push"
generate_playbook_repo_git_push: "True"
generate_playbook_repo_git_commit: "True"
generate_playbook_repo_pause_for_push: "False"
generate_playbook_repo_git_url: "https://github.com/jradabau-rh/ado-preflight.git"
generate_playbook_repo_git_branch: "main"
generate_playbook_repo_git_remote: "origin"
generate_playbook_repo_git_sync_before_push: true
generate_playbook_repo_git_username: "oauth2"
generate_playbook_repo_git_token: "{{ vault_controller_git_token }}"
